<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THO DARIUS — LoL Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/overlay.css">
</head>

<body>
    <script id="overlay-config" type="application/json">
    {
        "streamer": "THO DARIUS",
        "tagline": "Hand of Noxus",
        "rank": "Diamond II",
        "role": "Top",
        "mainChamp": "Darius",
        "winRate": "58%",
        "ticker": [
            "Main Darius • Top Lane",
            "Hand of Noxus • Noxus Will Rise",
            "Follow để không bỏ lỡ pentakill",
            "Donate qua Super Chat hoặc chuyển khoản"
        ],
        "donateRefreshMs": 300000
    }
    </script>

    <div class="vignette" aria-hidden="true"></div>

    <div class="wrap">
        <header class="header">
            <div class="brand">
                <div class="crest" aria-hidden="true">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <path d="M42 8c-2 5-8 8-13 7l-2 24-12 12c-2 2-2 6 0 8s6 2 8 0l12-12 24-2c-1-5 3-10 8-13-8-2-17 0-23 6l-7-7c6-6 8-15 6-23z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="title">
                    <h1 class="name" id="streamerName">THO DARIUS</h1>
                    <p class="meta">
                        <span id="streamerTagline">Hand of Noxus</span>
                        <span class="dot-sep">•</span>
                        <span id="champBadge">Darius Main</span>
                        <span class="dot-sep">•</span>
                        <span id="roleBadge">Top</span>
                        <span class="dot-sep">•</span>
                        <span id="rankBadge">Diamond II</span>
                        <span class="dot-sep">•</span>
                        <span id="winRateBadge">58% WR</span>
                    </p>
                </div>
            </div>
            <div class="live">
                <span class="live-dot"></span>
                TRỰC TIẾP
            </div>
        </header>

        <div class="ticker-bar">
            <span class="ticker-label">NOXUS</span>
            <div class="ticker-track">
                <div class="ticker-content" id="tickerContent"></div>
            </div>
        </div>

        <aside class="sidebar">
            <section class="panel chat" data-video-id="">
                <div class="panel-head">
                    <span class="panel-title">YouTube Chat</span>
                </div>
                <iframe id="ytChat" frameborder="0" allowfullscreen title="YouTube Live Chat"></iframe>
            </section>

            <section class="panel donate">
                <div class="panel-head">
                    <span class="panel-title">Top Donate</span>
                </div>
                <div class="donate-list" id="donateList">
                    <div class="donate-empty" id="donateEmpty">
                        <span>Chưa có donate hôm nay</span>
                    </div>
                </div>
            </section>
        </aside>

        <main class="game-area">
            <div class="game-frame">
                <div class="frame-corner tl"></div>
                <div class="frame-corner tr"></div>
                <div class="frame-corner bl"></div>
                <div class="frame-corner br"></div>
                <div class="stage" id="stage">
                    <div class="watermark" aria-hidden="true">
                        <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="6">
                            <path d="M168 36c-8 18-30 30-48 28l-6 86-42 42c-8 8-8 22 0 30s22 8 30 0l42-42 86-6c-2-18 10-40 28-48-28-8-60 0-82 22l-24-24c22-22 30-54 22-82z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/overlay.js" defer></script>
</body>

</html>
